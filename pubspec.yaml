name: codemagic
description: "Ignite — Codemagic CI/CD Admin"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  http: ^1.3.2
  shared_preferences: ^2.3.5
  intl: ^0.20.2
  timeago: ^3.7.0
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  url_launcher: ^6.3.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  package_info_plus: ^8.3.0
  qr_flutter: ^4.1.0
  yaml: ^3.1.2
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
